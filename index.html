<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AwParty</title>
    <link rel="icon" type="image/png" href="assets/icon.png" />
    <link rel="apple-touch-icon" href="assets/icon.png" />
    <style>
        @font-face {
            font-family: 'Orbitron';
            src: url('assets/Orbitron-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-display: block;
        }
        /* Exo 2 — техно-шрифт с кириллицей (Orbitron её не содержит). */
        @font-face {
            font-family: 'Exo 2';
            src: url('assets/Exo2-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-display: block;
        }
        html, body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        /* Прогрев шрифтов, чтобы Phaser-текст сразу рисовался нужным шрифтом */
        #fontwarm {
            position: absolute;
            left: -9999px;
            font-family: 'Orbitron';
        }
        #fontwarm2 {
            position: absolute;
            left: -9999px;
            font-family: 'Exo 2';
        }
        #game {
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
        /* Экран загрузки: чистый HTML/CSS, виден мгновенно (до загрузки phaser/модулей).
           Шрифт — системный (Orbitron с font-display:block был бы невидим до ~3с). */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            font-family: Arial, Helvetica, sans-serif;
            transition: opacity 0.4s ease;
        }
        #loader.hide { opacity: 0; pointer-events: none; }
        #loader .spin { position: relative; width: 120px; height: 120px; }
        #loader .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: #ff0096;
            border-right-color: #00e6ff;
            box-shadow: 0 0 18px rgba(255, 0, 150, 0.5), inset 0 0 18px rgba(0, 230, 255, 0.3);
            animation: awspin 0.9s linear infinite;
        }
        #loader .ico {
            position: absolute;
            top: 22px; left: 22px;
            width: 76px; height: 76px;
            object-fit: cover;
            border-radius: 50%; /* обрезаем квадратный фон иконки по кругу под спиннер */
            animation: awpulse 1.4s ease-in-out infinite;
        }
        #loader .txt {
            color: #cfd8ff;
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 230, 255, 0.6);
            opacity: 0.85;
        }
        @keyframes awspin { to { transform: rotate(360deg); } }
        @keyframes awpulse {
            0%, 100% { transform: scale(1);    opacity: 0.9; }
            50%      { transform: scale(1.08); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Экран загрузки: первым в body, до блокирующего <script src="phaser.min.js">,
         чтобы успеть отрисоваться, пока качаются движок и модули. -->
    <div id="loader">
        <div class="spin">
            <div class="ring"></div>
            <img class="ico" src="assets/icon.png" alt="" />
        </div>
        <div class="txt" id="loaderTxt">Loading, please wait…</div>
    </div>
    <script>
        (function () {
            // i18n ещё не загружен — язык метки определяем по браузеру.
            var ru = (navigator.language || '').toLowerCase().indexOf('ru') === 0;
            var el = document.getElementById('loaderTxt');
            if (el) el.textContent = ru ? 'Загрузка, подождите…' : 'Loading, please wait…';
            // Вызывается из MainScene.create(), когда меню построено и первый кадр готов.
            window.__awHideLoader = function () {
                var l = document.getElementById('loader');
                if (!l) return;
                l.classList.add('hide');
                setTimeout(function () { if (l.parentNode) l.parentNode.removeChild(l); }, 450);
            };
        })();
    </script>

    <div id="game"></div>
    <span id="fontwarm">warm</span>
    <span id="fontwarm2">прогрев</span>

    <!-- Отключаем контекстное меню по ПКМ.
         capture=true — перехват в фазе погружения, раньше любых обработчиков на canvas,
         поэтому меню не появится, даже если кто-то вызовет stopPropagation. -->
    <script>
        document.addEventListener('contextmenu', function (e) { e.preventDefault(); return false; }, true);
    </script>

    <!-- Engine -->
    <script src="phaser.min.js"></script>

    <!-- Game modules (load order matters: plain globals, no bundler).
         Анти-кэш: версия задаётся ОДИН раз в ASSET_VER ниже — поднимите её при
         правках любого модуля, чтобы браузер взял свежий код всех файлов.
         script.async = false сохраняет порядок выполнения вставленных скриптов. -->
    <script>
        (function () {
            var ASSET_VER = '202'; // ← единственное место для бампа версии модулей
            // Порядок важен: scene.js объявляет класс MainScene, затем scene_fx/scene_records/
            // scene_ui навешивают методы на его прототип, и только потом main.js создаёт игру.
            var MODULES = [
                'constants', 'i18n', 'utils', 'save', 'entities', 'spawner',
                'hud', 'shop', 'audio', 'config', 'leaderboard_remote', 'cloud_save',
                'scene', 'scene_fx', 'scene_combat', 'scene_spawndriver', 'scene_records', 'scene_ui', 'main',
            ];
            MODULES.forEach(function (name) {
                var s = document.createElement('script');
                s.src = 'src/' + name + '.js?v=' + ASSET_VER;
                s.async = false; // упорядоченное выполнение (как у обычных <script> по порядку)
                document.head.appendChild(s);
            });
        })();
    </script>
</body>
</html>
